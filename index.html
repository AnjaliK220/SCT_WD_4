<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional To-Do Web App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="todo-container">
        <h1>Task <span>Manager</span></h1>
        
        <form id="todo-form" class="todo-input-section">
            <input type="text" id="task-input" placeholder="What needs to be done?" required>
            <input type="datetime-local" id="task-datetime" required>
            <button type="submit" id="add-btn">Add Task</button>
        </form>

        <ul id="todo-list" class="todo-list"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
